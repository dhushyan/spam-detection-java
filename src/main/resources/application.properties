# ============================================
# APPLICATION CONFIG (replaces Django settings.py)
# ============================================
spring.application.name=Spam Detection Classifier

# ============================================
# MySQL DATABASE (replaces SQLite db.sqlite3)
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/spam_detection_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

spring.datasource.username=root
spring.datasource.password=9344404279

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate (replaces Django ORM + migrations)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# THYMELEAF (replaces Django templates)
# ============================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ============================================
# SERVER
# ============================================
server.port=8080

# ============================================
# PYTHON ML API URL (your Flask microservice)
# ============================================
ml.api.url=http://localhost:5000

# ============================================
# FILE UPLOAD (for emails.csv)
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
